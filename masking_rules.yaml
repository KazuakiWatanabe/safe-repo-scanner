include_extensions:
  - ".php"
  - ".env"
  - ".yaml"
  - ".yml"
  - ".json"
  - ".ini"
  - ".conf"
  - ".xml"

exclude_paths:
  - ".git/"
  - "vendor/"
  - "node_modules/"
  - "storage/logs/"
  - "tmp/"
  - "cache/"

suspicious_keys:
  - "password"
  - "passwd"
  - "secret"
  - "api_key"
  - "access_token"
  - "private_key"
  - "hostname"
  - "DB_PASSWORD"
  - "AWS_SECRET_ACCESS_KEY"
  - "email"
  - "mail"
  - "from_address"
  - "reply_to"
  - "reply_to_address"
  - "sender"
  - "sender_address"
  - "MAIL_FROM_ADDRESS"
  - "MAIL_USERNAME"

replacement_map:
  connection_host: "dummy-host"
  credential_user: "dummy_user"
  credential_password: "********"
  db_name: "dummy_db"
  api_key: "dummy_key"
  token: "dummy_token"
  secret: "dummy_secret"
  ip_address: "0.0.0.0"
  private_key: "********"
  email: "dummy@example.com"

non_maskable_keys:
  - "port"
  - "timeout"
  - "starttls"
  - "ssl"
  - "tls"
  - "charset"
  - "driver"

email_placeholder_domains:
  - "example.com"
  - "example.jp"
  - "example.org"
  - "localhost"
  - "test.com"

allowlist: []
